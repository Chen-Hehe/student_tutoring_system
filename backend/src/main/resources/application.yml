server:
  port: ${SERVER_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: student-tutoring-system
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:tutoring}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:8022}
  
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# MyBatis Plus Configuration
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.tutoring.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:student-tutoring-system-secret-key-must-be-at-least-32-characters}
  expiration: ${JWT_EXPIRATION:86400000}
  header: Authorization
  prefix: Bearer 

# OSS Configuration (Aliyun)
oss:
  endpoint: ${OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  bucket-name: ${OSS_BUCKET_NAME:}

# WebSocket Configuration
websocket:
  path: /ws

# Logging
logging:
  level:
    com.tutoring: debug
    org.springframework.web: info
    org.springframework.security: debug

# Spring MVC Configuration
spring:
  mvc:
    static-path-pattern: /**
    add-mappings: true

# AI Match Configuration
ai:
  match:
    # 通义千问 API Key (用户提供的 key)
    api-key: sk-2d01e7e8bba049da85bf4482b7424a57
    # 模型名称
    model: qwen-plus
    # 请求超时时间 (秒)
    timeout: 30
    # 最大重试次数
    max-retries: 3
    # 是否启用 AI 匹配
    enabled: true
    # 混合匹配权重 - AI 评分占比 (0.6 = 60% AI + 40% 规则)
    ai-weight: 0.6
    # 最低推荐分数阈值
    min-score: 60.0
    # 每日最大调用次数
    daily-limit: 1000
