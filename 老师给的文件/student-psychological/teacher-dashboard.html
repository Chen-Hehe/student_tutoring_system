<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师仪表盘 - 乡村助学平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        
        .sidebar h2 {
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.5em;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-menu li {
            margin-bottom: 10px;
        }
        
        .nav-menu a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .nav-menu a:hover {
            background-color: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }
        
        .nav-menu a.active {
            background-color: rgba(255,255,255,0.3);
            font-weight: bold;
        }
        
        .main-content {
            flex: 1;
            padding: 20px;
        }
        
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #2196F3;
            font-size: 1.8em;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2196F3;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        
        .card h3 {
            color: #2196F3;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .card-icon {
            font-size: 2.5em;
            margin-bottom: 15px;
            color: #2196F3;
        }
        
        .student-list {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .student-list h3 {
            color: #2196F3;
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        
        .student-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            transition: all 0.3s ease;
        }
        
        .student-item:hover {
            background-color: #f9f9f9;
        }
        
        .student-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #E3F2FD;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2196F3;
            font-weight: bold;
            margin-right: 15px;
        }
        
        .student-info {
            flex: 1;
        }
        
        .student-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .student-grade {
            font-size: 0.9em;
            color: #666;
        }
        
        .student-status {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
        }
        
        .status-active {
            background-color: #d4edda;
            color: #155724;
        }
        
        .status-pending {
            background-color: #fff3cd;
            color: #856404;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 10px;
        }
        
        .btn-primary {
            background: #2196F3;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1976D2;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                padding: 10px;
            }
            
            .nav-menu {
                display: flex;
                overflow-x: auto;
                gap: 10px;
            }
            
            .nav-menu li {
                margin-bottom: 0;
            }
            
            .dashboard-cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>教师中心</h2>
            <ul class="nav-menu">
                <li><a href="teacher-dashboard.html" class="active">仪表盘</a></li>
                <li><a href="teacher-student-management.html">学生管理</a></li>
                <li><a href="teacher-chat.html">聊天沟通</a></li>
                <li><a href="teacher-resources.html">教学资源</a></li>
                <li><a href="teacher-psychological.html">心理辅导</a></li>
                <li><a href="teacher-ai-match.html">AI匹配</a></li>
                <li><a href="teacher-match-management.html">匹配管理</a></li>
                <li><a href="login.html">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h1>教师仪表盘</h1>
                <div class="user-info">
                    <span>欢迎，李老师</span>
                    <div class="user-avatar">李</div>
                </div>
            </div>
            
            <div class="dashboard-cards">
                <div class="card">
                    <div class="card-icon">👨‍🎓</div>
                    <h3>辅导学生</h3>
                    <p>当前辅导 8 名学生</p>
                    <p>本周新增 2 名学生</p>
                </div>
                
                <div class="card">
                    <div class="card-icon">📚</div>
                    <h3>教学任务</h3>
                    <p>待批改作业：5 份</p>
                    <p>本周课程：12 节</p>
                </div>
                
                <div class="card">
                    <div class="card-icon">💬</div>
                    <h3>消息通知</h3>
                    <p>未读消息：3 条</p>
                    <p>待处理请求：2 个</p>
                </div>
            </div>
            
            <div class="student-list">
                <h3>我的学生</h3>
                <div class="student-item">
                    <div class="student-avatar">小</div>
                    <div class="student-info">
                        <div class="student-name">小明</div>
                        <div class="student-grade">三年级</div>
                    </div>
                    <span class="student-status status-active">活跃</span>
                    <button class="btn btn-primary">沟通</button>
                </div>
                <div class="student-item">
                    <div class="student-avatar">小</div>
                    <div class="student-info">
                        <div class="student-name">小红</div>
                        <div class="student-grade">四年级</div>
                    </div>
                    <span class="student-status status-active">活跃</span>
                    <button class="btn btn-primary">沟通</button>
                </div>
                <div class="student-item">
                    <div class="student-avatar">小</div>
                    <div class="student-info">
                        <div class="student-name">小刚</div>
                        <div class="student-grade">五年级</div>
                    </div>
                    <span class="student-status status-pending">待确认</span>
                    <button class="btn btn-primary">确认</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
