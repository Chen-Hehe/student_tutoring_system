<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师选择 - 乡村助学平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        
        .sidebar h2 {
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.5em;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-menu li {
            margin-bottom: 10px;
        }
        
        .nav-menu a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .nav-menu a:hover {
            background-color: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }
        
        .nav-menu a.active {
            background-color: rgba(255,255,255,0.3);
            font-weight: bold;
        }
        
        .main-content {
            flex: 1;
            padding: 20px;
        }
        
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #4CAF50;
            font-size: 1.8em;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #4CAF50;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .search-filter {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .search-bar input {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .search-bar button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .search-bar button:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-item {
            display: flex;
            flex-direction: column;
        }
        
        .filter-item label {
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        .filter-item select {
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .teacher-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .teacher-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        
        .teacher-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        
        .teacher-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .teacher-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #E8F5E8;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4CAF50;
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .teacher-info h3 {
            color: #4CAF50;
            margin-bottom: 5px;
        }
        
        .teacher-subject {
            font-size: 0.9em;
            color: #666;
        }
        
        .teacher-details {
            margin-bottom: 15px;
        }
        
        .teacher-details p {
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        
        .teacher-skills {
            margin-bottom: 15px;
        }
        
        .skill-tag {
            display: inline-block;
            padding: 5px 10px;
            background: #E8F5E8;
            color: #4CAF50;
            border-radius: 15px;
            font-size: 0.8em;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        
        .btn-request {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-request:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                padding: 10px;
            }
            
            .nav-menu {
                display: flex;
                overflow-x: auto;
                gap: 10px;
            }
            
            .nav-menu li {
                margin-bottom: 0;
            }
            
            .filters {
                flex-direction: column;
            }
            
            .teacher-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>学生中心</h2>
            <ul class="nav-menu">
                <li><a href="student-dashboard.html">仪表盘</a></li>
                <li><a href="student-teacher-selection.html" class="active">教师选择</a></li>
                <li><a href="student-chat.html">聊天沟通</a></li>
                <li><a href="student-resources.html">学习资源</a></li>
                <li><a href="student-psychological.html">心理支持</a></li>
                <li><a href="student-ai-recommendation.html">AI推荐</a></li>
                <li><a href="student-match.html">匹配管理</a></li>
                <li><a href="login.html">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h1>教师选择</h1>
                <div class="user-info">
                    <span>欢迎，小明</span>
                    <div class="user-avatar">小</div>
                </div>
            </div>
            
            <div class="search-filter">
                <div class="search-bar">
                    <input type="text" placeholder="搜索教师姓名或科目">
                    <button>搜索</button>
                </div>
                <div class="filters">
                    <div class="filter-item">
                        <label>科目</label>
                        <select>
                            <option value="">全部科目</option>
                            <option value="math">数学</option>
                            <option value="chinese">语文</option>
                            <option value="english">英语</option>
                            <option value="physics">物理</option>
                            <option value="chemistry">化学</option>
                            <option value="biology">生物</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>教学经验</label>
                        <select>
                            <option value="">全部经验</option>
                            <option value="1-3">1-3年</option>
                            <option value="3-5">3-5年</option>
                            <option value="5+">5年以上</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>年级</label>
                        <select>
                            <option value="">全部年级</option>
                            <option value="primary">小学</option>
                            <option value="middle">初中</option>
                            <option value="high">高中</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="teacher-list">
                <div class="teacher-card">
                    <div class="teacher-header">
                        <div class="teacher-avatar">李</div>
                        <div class="teacher-info">
                            <h3>李老师</h3>
                            <div class="teacher-subject">数学教师</div>
                        </div>
                    </div>
                    <div class="teacher-details">
                        <p>🎓 教育背景：北京大学数学专业</p>
                        <p>📚 教学经验：8年</p>
                        <p>📍 所在地：北京市</p>
                    </div>
                    <div class="teacher-skills">
                        <span class="skill-tag">小学数学</span>
                        <span class="skill-tag">初中数学</span>
                        <span class="skill-tag">奥数</span>
                    </div>
                    <button class="btn-request" onclick="requestTeacher(1)">发送辅导请求</button>
                </div>
                
                <div class="teacher-card">
                    <div class="teacher-header">
                        <div class="teacher-avatar">王</div>
                        <div class="teacher-info">
                            <h3>王老师</h3>
                            <div class="teacher-subject">语文教师</div>
                        </div>
                    </div>
                    <div class="teacher-details">
                        <p>🎓 教育背景：北京师范大学中文专业</p>
                        <p>📚 教学经验：5年</p>
                        <p>📍 所在地：上海市</p>
                    </div>
                    <div class="teacher-skills">
                        <span class="skill-tag">小学语文</span>
                        <span class="skill-tag">初中语文</span>
                        <span class="skill-tag">作文指导</span>
                    </div>
                    <button class="btn-request" onclick="requestTeacher(2)">发送辅导请求</button>
                </div>
                
                <div class="teacher-card">
                    <div class="teacher-header">
                        <div class="teacher-avatar">张</div>
                        <div class="teacher-info">
                            <h3>张老师</h3>
                            <div class="teacher-subject">英语教师</div>
                        </div>
                    </div>
                    <div class="teacher-details">
                        <p>🎓 教育背景：清华大学英语专业</p>
                        <p>📚 教学经验：6年</p>
                        <p>📍 所在地：广州市</p>
                    </div>
                    <div class="teacher-skills">
                        <span class="skill-tag">小学英语</span>
                        <span class="skill-tag">初中英语</span>
                        <span class="skill-tag">口语训练</span>
                    </div>
                    <button class="btn-request" onclick="requestTeacher(3)">发送辅导请求</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function requestTeacher(teacherId) {
            // 发送辅导请求
            alert('辅导请求已发送，请等待老师和家长确认');
            // 跳转到匹配管理页面
            window.location.href = 'student-match.html';
        }
    </script>
</body>
</html>
